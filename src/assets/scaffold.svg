<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="600" fill="#1b1b1b"/>
  <g stroke="#3a3a3a" stroke-width="6">
    <!-- verticals -->
    <line x1="150" y1="0" x2="150" y2="600"/>
    <line x1="350" y1="0" x2="350" y2="600"/>
    <line x1="550" y1="0" x2="550" y2="600"/>
    <line x1="750" y1="0" x2="750" y2="600"/>
    <line x1="950" y1="0" x2="950" y2="600"/>
    <line x1="1050" y1="0" x2="1050" y2="600"/>
    <!-- horizontals -->
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="260" x2="1200" y2="260"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>
  <g stroke="#2c2c2c" stroke-width="4">
    <!-- diagonal braces -->
    <line x1="150" y1="120" x2="350" y2="260"/>
    <line x1="550" y1="120" x2="750" y2="260"/>
    <line x1="950" y1="120" x2="1050" y2="260"/>
    <line x1="350" y1="400" x2="550" y2="540"/>
    <line x1="750" y1="400" x2="950" y2="540"/>
  </g>
</svg>
