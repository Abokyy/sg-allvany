<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 560" role="img"
     aria-label="A munkamagasság szemléltetése: a munkaszint magassága plusz körülbelül 2 méter.">
  <style>
    .struct { fill: none; stroke: #141414; stroke-width: 3; }
    .rail   { fill: none; stroke: #e10600; stroke-width: 5; stroke-linecap: round; }
    .person { fill: none; stroke: #141414; stroke-width: 10; stroke-linecap: round; stroke-linejoin: round; }
    .guide  { stroke: #b8b8b8; stroke-width: 1.5; stroke-dasharray: 5 5; }
    .dim    { fill: none; stroke: #141414; stroke-width: 2; }
    .dimred { fill: none; stroke: #e10600; stroke-width: 3; }
    .lbl    { fill: #5c5c5c; font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; }
    .lblsm  { fill: #7a7a7a; font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; }
    .lblred { fill: #e10600; font-family: 'Segoe UI', Arial, sans-serif; font-size: 19px; font-weight: 800; letter-spacing: .04em; }
  </style>

  <!-- talaj -->
  <line x1="60" y1="510" x2="346" y2="510" stroke="#141414" stroke-width="3"/>
  <g stroke="#9a9a9a" stroke-width="2">
    <line x1="78" y1="510" x2="66" y2="522"/>
    <line x1="108" y1="510" x2="96" y2="522"/>
    <line x1="138" y1="510" x2="126" y2="522"/>
    <line x1="168" y1="510" x2="156" y2="522"/>
    <line x1="198" y1="510" x2="186" y2="522"/>
    <line x1="228" y1="510" x2="216" y2="522"/>
    <line x1="258" y1="510" x2="246" y2="522"/>
    <line x1="288" y1="510" x2="276" y2="522"/>
    <line x1="318" y1="510" x2="306" y2="522"/>
  </g>

  <!-- gurulós állvány váz -->
  <line class="struct" x1="160" y1="300" x2="160" y2="482"/>
  <line class="struct" x1="300" y1="300" x2="300" y2="482"/>
  <line class="struct" x1="160" y1="380" x2="300" y2="482"/>
  <line class="struct" x1="300" y1="380" x2="160" y2="482"/>
  <line class="struct" x1="160" y1="431" x2="300" y2="431"/>

  <!-- munkaszint (platform) -->
  <rect x="146" y="372" width="168" height="13" rx="2" fill="#d2d2d2" stroke="#141414" stroke-width="3"/>

  <!-- korlát (piros márkaszín) -->
  <line class="rail" x1="160" y1="312" x2="300" y2="312"/>
  <line class="rail" x1="160" y1="345" x2="300" y2="345"/>

  <!-- kerekek -->
  <circle class="struct" cx="160" cy="496" r="14"/>
  <circle class="struct" cx="300" cy="496" r="14"/>
  <circle cx="160" cy="496" r="3" fill="#141414"/>
  <circle cx="300" cy="496" r="3" fill="#141414"/>

  <!-- dolgozó a munkaszinten -->
  <circle cx="230" cy="168" r="18" fill="#141414"/>
  <path class="person" d="M230 188 V298"/>
  <path class="person" d="M230 298 L206 372"/>
  <path class="person" d="M230 298 L254 372"/>
  <path class="person" d="M230 208 L196 262"/>
  <path class="person" d="M230 208 L262 132"/>

  <!-- vezérvonalak -->
  <line class="guide" x1="262" y1="130" x2="528" y2="130"/>
  <line class="guide" x1="314" y1="378" x2="528" y2="378"/>
  <line class="guide" x1="314" y1="510" x2="528" y2="510"/>

  <!-- méretvonal: munkaszint + 2 m -->
  <line class="dim" x1="384" y1="130" x2="384" y2="510"/>
  <g stroke="#141414" stroke-width="2">
    <line x1="376" y1="130" x2="392" y2="130"/>
    <line x1="376" y1="378" x2="392" y2="378"/>
    <line x1="376" y1="510" x2="392" y2="510"/>
  </g>
  <text class="lbl" x="398" y="450">Munkaszint</text>
  <text class="lbl" x="398" y="468">magassága</text>
  <text class="lbl" x="398" y="246">+ kb. 2 m</text>
  <text class="lblsm" x="398" y="264">testmagasság +</text>
  <text class="lblsm" x="398" y="279">kartávolság</text>

  <!-- teljes munkamagasság (piros) -->
  <line class="dimred" x1="516" y1="130" x2="516" y2="510"/>
  <g stroke="#e10600" stroke-width="3">
    <line x1="507" y1="130" x2="525" y2="130"/>
    <line x1="507" y1="510" x2="525" y2="510"/>
  </g>
  <text class="lblred" x="548" y="320" text-anchor="middle"
        transform="rotate(-90 548 320)">MUNKAMAGASSÁG</text>
</svg>
